<!DOCTYPE html>
<html lang="ko" class="h-full scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTENTS CREATIVE 3TEAM | Portfolio</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->

  <!-- Tailwind Customization -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#2563eb',

  <!-- Custom Core Style Override -->
  <style>
    /* Custom thin scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cccccc;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #999999;
    }
    /* Hide scrollbar for category list scrolling on mobile */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Hover scaling easing */
    .transition-card {
      transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    /* Overlay fade */
    .hover-overlay {
      transition: opacity 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    /* Modern Form validation feedback with :has() */
    .space-y-1.5:has(input:placeholder-shown:invalid) label {
      color: #ef4444; /* red text for blank invalid fields */
    }
    .space-y-1.5:has(input:placeholder-shown:invalid) input {
      border-color: #fca5a5;
    }
    
    /* CSS Container Queries for responsive text scaling inside cards */
    @container (max-width: 350px) {
      .hover-overlay h3 {
        font-size: 0.875rem !important; /* text-sm equivalent */
      }
      .hover-overlay p {
        font-size: 9px !important;
      }
    }
  </style>
</head>
<body class="min-h-full flex flex-col bg-white text-[#111111] antialiased selection:bg-neutral-200 selection:text-neutral-900">

  <!-- Core App Root -->

  <!-- JavaScript Single File SPA Logic -->
  <script>
    // ==========================================

    // ==========================================

    const DEFAULT_PROJECTS = [
      {
        id: "proj-1",
        title: "현대 모빌리티 브랜드 리브랜딩",
        slug: "hyundai-mobility-rebranding",

        thumbnail_url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200",
        media_urls: [
          "https://images.unsplash.com/photo-1626785774573-4b799315345d?q=80&w=1200",
          "https://images.unsplash.com/photo-1541462608143-67571c6738dd?q=80&w=1200",
          "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1200"
        ],
        video_url: "",
        is_published: true,
        is_featured: true,
        sort_order: 1,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      },
      {
        id: "proj-2",
        title: "글로벌 패션 테크 기업 2026 브랜드 필름",
        slug: "fashion-tech-brand-film-2026",
        category_id: "cat-editing",

        year: 2026,
        role: "Video Editing & Color Grading",
        description: "가상 의류 피팅 플랫폼 AURA의 2026 런칭 브랜드 필름입니다. 3D 의상 시뮬레이션 소스와 실제 모델 촬영본을 정교하게 매치 컷하여 가상과 현실이 연결되는 연출을 극대화했습니다. 강렬한 비트의 사운드트랙에 맞춘 속도감 있는 트랜지션과 모던한 색보정(Cyberpunk Teal & Amber)으로 역동적인 무드를 완성했습니다.",
        thumbnail_url: "https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?q=80&w=1200",
        media_urls: [
          "https://images.unsplash.com/photo-1536240478700-b869070f9279?q=80&w=1200",
          "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1200"
        ],
        video_url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        is_published: true,

      },
      {

        description: "지속 가능한 환경을 지향하는 뷰티 & 홈 데코 브랜드 Greenery Lab의 친환경 패키지 디자인 프로젝트입니다. 재활용 펄프지와 콩기름 인쇄를 기준으로 하여 자연 그대로의 거칠고 포근한 질감을 살렸으며, 타이포그래피 위주의 심플한 라벨 디자인으로 불필요한 가공을 줄였습니다.",
        thumbnail_url: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=1200",
        media_urls: [
          "https://images.unsplash.com/photo-1605263133935-96f33c89b495?q=80&w=1200",
          "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200"
        ],
        video_url: "",
        is_published: true,
        is_featured: false,
        sort_order: 3,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      },
      {
        id: "proj-4",
        title: "신선식품 커머스 'FRESCO' 인스타그램 캠페인",
        slug: "fresco-instagram-campaign",
        category_id: "cat-sns-content",
        client_name: "Fresco Corporation",
        year: 2026,
        role: "Art Direction & Social Content Creation",
        description: "MZ세대를 타겟으로 한 식재료 큐레이션 서비스 FRESCO의 SNS 비주얼 가이드를 수립했습니다. 볼드한 네온 컬러 매치와 유머러스한 일러스트 팝업을 활용하여 스크롤을 멈추게 하는 크리에이티브를 개발했습니다. 한 달간의 캠페인 결과, 브랜드 오피셜 인스타그램 계정의 도달율이 전월 대비 140% 향상되었습니다.",
        thumbnail_url: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1200",
        media_urls: [
          "https://images.unsplash.com/photo-1611162616305-c69b3fa7fbe0?q=80&w=1200",
          "https://images.unsplash.com/photo-1461151304267-38535e780c79?q=80&w=1200"
        ],
        video_url: "",
        is_published: true,
        is_featured: false,
        sort_order: 4,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      }
    ];

    // In-memory Database Fallback for local double-click (file:// protocol) where localStorage might block
    let memoryDB = {
      categories: [...DEFAULT_CATEGORIES],
      projects: [...DEFAULT_PROJECTS],
      settings: { ...DEFAULT_SETTINGS },
      inquiries: [],
      session: null
    };

    function isLocalStorageAvailable() {
      try {
        localStorage.setItem("test_storage", "test");
        localStorage.removeItem("test_storage");
        return true;
      } catch (e) {
        return false;
      }
    }

    const useStorage = isLocalStorageAvailable();

    // Seed Database to LocalStorage
    function initDatabase() {
      if (!useStorage) {
        console.warn("Local storage blocked or unavailable (e.g. running on file://). Falling back to In-Memory DB.");
        return;
      }
      try {
        if (!localStorage.getItem("nexus_categories")) {
          localStorage.setItem("nexus_categories", JSON.stringify(DEFAULT_CATEGORIES));
        }
        if (!localStorage.getItem("nexus_settings")) {
          localStorage.setItem("nexus_settings", JSON.stringify(DEFAULT_SETTINGS));
        }
        if (!localStorage.getItem("nexus_projects")) {
          localStorage.setItem("nexus_projects", JSON.stringify(DEFAULT_PROJECTS));
        }
        if (!localStorage.getItem("nexus_inquiries")) {
          localStorage.setItem("nexus_inquiries", JSON.stringify([]));
        }
      } catch (e) {
        console.error("Failed to seed localStorage:", e);
      }
    }

    // Database access helpers
    const db = {
      getCategories() {
        if (!useStorage) return memoryDB.categories.sort((a, b) => a.sort_order - b.sort_order);
        try {
          return JSON.parse(localStorage.getItem("nexus_categories") || "[]").sort((a, b) => a.sort_order - b.sort_order);
        } catch (e) {
          return [...DEFAULT_CATEGORIES];
        }
      },
      saveCategory(cat) {
        const list = this.getCategories();
        if (cat.id) {
          const index = list.findIndex(c => c.id === cat.id);
          if (index !== -1) list[index] = { ...list[index], ...cat };
        } else {
          cat.id = "cat-" + Date.now();
          cat.created_at = new Date().toISOString();
          list.push(cat);
        }
        if (useStorage) {
          try { localStorage.setItem("nexus_categories", JSON.stringify(list)); } catch (e) {}
        } else {
          memoryDB.categories = list;
        }
        return cat;
      },
      deleteCategory(id) {
        const list = this.getCategories();
        const filtered = list.filter(c => c.id !== id);
        if (useStorage) {
          try { localStorage.setItem("nexus_categories", JSON.stringify(filtered)); } catch (e) {}
        } else {
          memoryDB.categories = filtered;
        }
      },
      getProjects(includeDrafts = false) {
        let list = [];
        if (!useStorage) {
          list = memoryDB.projects;
        } else {
          try {
            list = JSON.parse(localStorage.getItem("nexus_projects") || "[]");
          } catch (e) {
            list = [...DEFAULT_PROJECTS];
          }
        }
        const filtered = includeDrafts ? list : list.filter(p => p.is_published);
        return filtered.sort((a, b) => a.sort_order - b.sort_order);
      },
      getProjectBySlug(slug) {
        const list = this.getProjects(true);
        return list.find(p => p.slug === slug && p.is_published) || null;
      },
      getProjectById(id) {
        const list = this.getProjects(true);
        return list.find(p => p.id === id) || null;
      },
      saveProject(proj) {
        const list = this.getProjects(true);
        proj.updated_at = new Date().toISOString();
        if (proj.id) {
          const index = list.findIndex(p => p.id === proj.id);
          if (index !== -1) list[index] = { ...list[index], ...proj };
        } else {
          proj.id = "proj-" + Date.now();
          proj.created_at = new Date().toISOString();
          list.push(proj);
        }
        if (useStorage) {
          try { localStorage.setItem("nexus_projects", JSON.stringify(list)); } catch (e) {}
        } else {
          memoryDB.projects = list;
        }
        return proj;
      },
      deleteProject(id) {
        const list = this.getProjects(true);
        const index = list.findIndex(p => p.id === id);
        if (index !== -1) {
          list[index].is_published = false;
          if (useStorage) {
            try { localStorage.setItem("nexus_projects", JSON.stringify(list)); } catch (e) {}
          } else {
            memoryDB.projects = list;
          }
        }
      },
      hardDeleteProject(id) {
        const list = this.getProjects(true);
        const filtered = list.filter(p => p.id !== id);
        if (useStorage) {
          try { localStorage.setItem("nexus_projects", JSON.stringify(filtered)); } catch (e) {}
        } else {
          memoryDB.projects = filtered;
        }
      },
      getSettings() {
        if (!useStorage) return memoryDB.settings;
        try {
          return JSON.parse(localStorage.getItem("nexus_settings") || "[]") || DEFAULT_SETTINGS;
        } catch (e) {
          return DEFAULT_SETTINGS;
        }
      },
      saveSettings(settings) {
        settings.updated_at = new Date().toISOString();
        if (useStorage) {
          try { localStorage.setItem("nexus_settings", JSON.stringify(settings)); } catch (e) {}
        } else {
          memoryDB.settings = settings;
        }
        return settings;
      },
      getInquiries() {
        if (!useStorage) return memoryDB.inquiries;
        try {
          return JSON.parse(localStorage.getItem("nexus_inquiries") || "[]") || [];
        } catch (e) {
          return [];
        }
      },
      saveInquiry(inq) {
        const list = this.getInquiries();
        inq.id = "inq-" + Date.now();
        inq.created_at = new Date().toISOString();
        list.push(inq);
        if (useStorage) {
          try { localStorage.setItem("nexus_inquiries", JSON.stringify(list)); } catch (e) {}
        } else {
          memoryDB.inquiries = list;
        }
      },
      deleteInquiry(id) {
        const list = this.getInquiries();
        const filtered = list.filter(inq => inq.id !== id);
        if (useStorage) {
          try { localStorage.setItem("nexus_inquiries", JSON.stringify(filtered)); } catch (e) {}
        } else {
          memoryDB.inquiries = filtered;
        }
      }
    };

    // Auth Helper
    const MOCK_EMAIL = "admin@team.com";
    const MOCK_PASSWORD = "admin1234";
    const auth = {
      login(email, password) {
        if (email === MOCK_EMAIL && password === MOCK_PASSWORD) {
          const sessionObj = { email, authenticated: true, timestamp: Date.now() };
          if (useStorage) {
            try { localStorage.setItem("nexus_admin_session", JSON.stringify(sessionObj)); } catch (e) {}
          } else {
            memoryDB.session = sessionObj;
          }
          return { success: true };
        }
        return { success: false, error: "이메일 또는 비밀번호가 틀립니다. (admin@team.com / admin1234)" };
      },
      logout() {
        if (useStorage) {
          try { localStorage.removeItem("nexus_admin_session"); } catch (e) {}
        } else {
          memoryDB.session = null;
        }
      },
      isAuthenticated() {
        if (!useStorage) return !!memoryDB.session;
        try {
          const session = localStorage.getItem("nexus_admin_session");
          if (!session) return false;
          return JSON.parse(session).authenticated === true;
        } catch (e) {
          return false;
        }
      }
    };

    // ==========================================
    // 2. CLIENT-SIDE ROUTER
    // ==========================================
    function getRoute() {
      const hash = window.location.hash || "#/";
      
      // Dynamic route matching: #/works/:slug
      if (hash.startsWith("#/works/")) {
        const slug = hash.replace("#/works/", "");
        if (slug && !slug.includes("/")) {
          return { name: "project-detail", params: { slug } };
        }
      }
      
      const routes = {
        "#/": "home",
        "#/works": "works",
        "#/about": "about",
        "#/contact": "contact",
        "#/admin/login": "admin-login",
        "#/admin/dashboard": "admin-dashboard",
        "#/admin/projects": "admin-projects",
        "#/admin/categories": "admin-categories",
        "#/admin/settings": "admin-settings"
      };
      
      return { name: routes[hash] || "not-found", params: {} };
    }

    // Main App Router Trigger
    function router() {
      const route = getRoute();
      const appDiv = document.getElementById("app");
      
      // Admin Route Guard
      if (route.name.startsWith("admin-") && route.name !== "admin-login") {
        if (!auth.isAuthenticated()) {
          window.location.hash = "#/admin/login";
          return;
        }
      }

      // Render Layout Wrapper
      const render = () => {
        const isAdmin = route.name.startsWith("admin-");
        let html = "";

        if (isAdmin) {
          // Layout: Admin CMS Layout with Sidebar
          if (route.name === "admin-login") {
            html = renderAdminLoginView();
          } else {
            html = `
              <div class="flex min-h-screen bg-neutral-950 text-neutral-100 font-sans">
                ${renderAdminSidebar()}
                <main class="flex-grow p-8 sm:p-12 overflow-y-auto max-w-5xl mx-auto w-full">
                  <div id="admin-view-content"></div>
                </main>
              </div>
            `;
          }
          appDiv.innerHTML = html;
          
          // Render Sub-Views
          if (route.name === "admin-dashboard") renderAdminDashboardView();
          if (route.name === "admin-projects") renderAdminProjectsView();
          if (route.name === "admin-categories") renderAdminCategoriesView();
          if (route.name === "admin-settings") renderAdminSettingsView();
        } else {
          // Layout: Main Visitor Layout with Header/Footer
          html = `
            ${renderHeader()}
            <main class="flex-grow flex flex-col pt-20">
              <div id="visitor-view-content"></div>
            </main>
            ${renderFooter()}
          `;
          appDiv.innerHTML = html;

          // Render Sub-Views
          if (route.name === "home") renderHomeView();
          if (route.name === "works") renderWorksView();
          if (route.name === "project-detail") renderProjectDetailView(route.params.slug);
          if (route.name === "about") renderAboutView();
          if (route.name === "contact") renderContactView();
          if (route.name === "not-found") renderNotFoundView();
        }
      };

      // Wrap rendering in View Transitions API if supported
      if (document.startViewTransition) {
        document.startViewTransition(() => {
          render();
          if (typeof lucide !== "undefined") {
            lucide.createIcons();
          }
          window.scrollTo(0, 0);
        });
      } else {
        render();
        if (typeof lucide !== "undefined") {
          lucide.createIcons();
        }
        window.scrollTo(0, 0);
      }
    }

    // ==========================================
    // 3. VISITOR LAYOUT PARTS
    // ==========================================
    function renderHeader() {
      const isLogged = auth.isAuthenticated();
      const pathname = window.location.hash;
      const worksActive = pathname === "#/works" || pathname.startsWith("#/works/");
      const aboutActive = pathname === "#/about";
      const contactActive = pathname === "#/contact";

      return `
        <header class="fixed top-0 left-0 z-50 w-full border-b border-neutral-100 bg-white/80 backdrop-blur-md">
          <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-6 sm:px-8">
            <a href="#/" class="group flex items-center gap-2">
              <span class="text-2xl font-black tracking-tighter transition-colors group-hover:text-accent">CONTENTS CREATIVE 3TEAM</span>
              <span class="h-1.5 w-1.5 rounded-full bg-accent transition-transform group-hover:scale-150"></span>
            </a>
            <nav class="flex items-center gap-8 sm:gap-12">
              <ul class="flex items-center gap-6 sm:gap-8 text-xs font-bold tracking-widest">
                <li>
                  <a href="#/works" class="relative py-2 transition-colors hover:text-black ${worksActive ? 'text-black font-black' : 'text-neutral-500'}">
                    WORKS
                    ${worksActive ? '<span class="absolute bottom-0 left-0 h-[2px] w-full bg-black"></span>' : ''}
                  </a>

        if (match && match[2].length === 11) {

        }
        return url;

      submitBtn.disabled = true;
      submitBtn.innerText = "SENDING...";

      const name = document.getElementById("inq-name").value;
      const email = document.getElementById("inq-email").value;
      const subject = document.getElementById("inq-subject").value;
      const message = document.getElementById("inq-message").value;

      setTimeout(() => {
        db.saveInquiry({ name, email, subject, message });
        
        // Show success
        const panel = document.getElementById("contact-success-panel");
        panel.classList.remove("hidden");
        panel.classList.add("flex");
        
        // Reset form
        document.getElementById("visitor-inquiry-form").reset();

        setTimeout(() => {
          panel.classList.remove("flex");
          panel.classList.add("hidden");
          submitBtn.disabled = false;
          submitBtn.innerText = "SEND INQUIRY";
        }, 5000);
      }, 1200);
    };

    };

    window.softDeleteProj = function(id) {
      if (confirm("이 프로젝트를 비공개 처리(Soft Delete)하시겠습니까?")) {
        db.deleteProject(id);
        renderAdminProjectsView();
        if (typeof lucide !== "undefined") lucide.createIcons();
      }
    };

    window.hardDeleteProj = function(id) {
      if (confirm("이 프로젝트를 영구 삭제하시겠습니까? 이 작업은 복구되지 않습니다.")) {
        db.hardDeleteProject(id);
        renderAdminProjectsView();
        if (typeof lucide !== "undefined") lucide.createIcons();
      }
    };

    // Modal Control Logic
    let currentGalleryUrls = [];
    window.openProjectModal = function(id) {
      currentEditProjectId = id;
      const modal = document.getElementById("project-form-modal");
      modal.showModal();
      
      const form = document.getElementById("project-cms-form");
      form.reset();

      if (id) {
        // Edit mode
        document.getElementById("modal-title").innerText = "프로젝트 수정";
        const proj = db.getProjectById(id);
        if (proj) {
          document.getElementById("f-title").value = proj.title;
          document.getElementById("f-slug").value = proj.slug;
          document.getElementById("f-client").value = proj.client_name;
          document.getElementById("f-cat").value = proj.category_id;
          document.getElementById("f-year").value = proj.year;
          document.getElementById("f-role").value = proj.role || "";
          document.getElementById("f-desc").value = proj.description || "";
          
          document.getElementById("f-published").checked = proj.is_published;
          document.getElementById("f-featured").checked = proj.is_featured;
          document.getElementById("f-order").value = proj.sort_order;
          document.getElementById("f-video").value = proj.video_url || "";

          // Thumbnail preview
          if (proj.thumbnail_url) {
            document.getElementById("f-thumb-preview").src = proj.thumbnail_url;
            document.getElementById("thumb-preview-box").classList.remove("hidden");
            document.getElementById("f-thumb-url").value = proj.thumbnail_url;
          } else {
            document.getElementById("thumb-preview-box").classList.add("hidden");
          }

          // Gallery list
          currentGalleryUrls = [...proj.media_urls];
          renderModalGalleryList();
        }
      } else {
        // Create mode
        document.getElementById("modal-title").innerText = "신규 프로젝트 등록";
        document.getElementById("f-published").checked = true;
        document.getElementById("f-featured").checked = false;
        document.getElementById("f-order").value = "0";
        document.getElementById("thumb-preview-box").classList.add("hidden");
        currentGalleryUrls = [];
        renderModalGalleryList();
      }

      if (typeof lucide !== "undefined") lucide.createIcons();
    };

    window.closeProjectModal = function() {
      const modal = document.getElementById("project-form-modal");
      modal.close();
    };

    // Auto slug creation
    window.handleFormTitleInput = function(elem) {
      if (!currentEditProjectId) {
        const slugInput = document.getElementById("f-slug");
        slugInput.value = elem.value
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9가-힣\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
      }
    };

    // Thumbnail controller inside modal
    window.applyCustomThumbUrl = function(val) {
      if (val.trim()) {
        document.getElementById("f-thumb-preview").src = val.trim();
        document.getElementById("thumb-preview-box").classList.remove("hidden");
      }
    };

    window.clearThumbPreview = function() {
      document.getElementById("f-thumb-preview").src = "";
      document.getElementById("thumb-preview-box").classList.add("hidden");
      document.getElementById("f-thumb-url").value = "";
    };

    // Custom image uploads conversion to base64
    window.handleModalMediaUpload = function(input, type) {
      const files = input.files;
      if (!files || files.length === 0) return;

      const readAndUpload = (file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.readAsDataURL(file);
        });
      };

      if (type === "thumb") {
        readAndUpload(files[0]).then(base64 => {
          document.getElementById("f-thumb-preview").src = base64;
          document.getElementById("thumb-preview-box").classList.remove("hidden");
          document.getElementById("f-thumb-url").value = base64;
        });
      } else {
        const promises = Array.from(files).map(file => readAndUpload(file));
        Promise.all(promises).then(urls => {
          currentGalleryUrls = [...currentGalleryUrls, ...urls];
          renderModalGalleryList();
        });
      }
    };

    window.addCustomGalleryUrl = function() {
      const input = document.getElementById("f-gallery-custom-input");
      if (input.value.trim()) {
        currentGalleryUrls.push(input.value.trim());
        renderModalGalleryList();
        input.value = "";
      }
    };

    window.removeModalGalleryItem = function(index) {
      currentGalleryUrls = currentGalleryUrls.filter((_, i) => i !== index);
      renderModalGalleryList();
    };

    function renderModalGalleryList() {
      const box = document.getElementById("modal-gallery-preview");
      box.innerHTML = currentGalleryUrls.map((url, i) => `
        <div class="relative aspect-square border border-neutral-800 bg-neutral-950 rounded overflow-hidden">
          <img src="${url}" class="w-full h-full object-cover" />
          <button type="button" onclick="removeModalGalleryItem(${i})" class="absolute top-0.5 right-0.5 p-0.5 bg-black/85 rounded-full text-white hover:bg-red-600 transition-colors"><i data-lucide="x" class="h-2 w-2"></i></button>
        </div>
      `).join("");
      if (typeof lucide !== "undefined") lucide.createIcons();
    }

    // Submit project form
    window.submitProjectForm = function(e) {
      e.preventDefault();
      
      const payload = {
        title: document.getElementById("f-title").value,
        slug: document.getElementById("f-slug").value,
        client_name: document.getElementById("f-client").value,
        category_id: document.getElementById("f-cat").value,
        year: Number(document.getElementById("f-year").value),
        role: document.getElementById("f-role").value,
        description: document.getElementById("f-desc").value,
        is_published: document.getElementById("f-published").checked,
        is_featured: document.getElementById("f-featured").checked,
        sort_order: Number(document.getElementById("f-order").value),
        video_url: document.getElementById("f-video").value,
        thumbnail_url: document.getElementById("f-thumb-url").value,
        media_urls: currentGalleryUrls
      };

      if (currentEditProjectId) {
        payload.id = currentEditProjectId;
      }

      db.saveProject(payload);
      closeProjectModal();
      renderAdminProjectsView();
      if (typeof lucide !== "undefined") lucide.createIcons();
    };

    // Admin Categories View
    let currentEditingCategoryId = null;
    function renderAdminCategoriesView() {
      const container = document.getElementById("admin-view-content");
      const list = db.getCategories();

      container.innerHTML = `
        <div class="space-y-8 animate-fade-in">
          <!-- Header -->
          <div class="border-b border-neutral-800 pb-6">
            <span class="text-[10px] font-bold tracking-widest text-accent uppercase">CMS TAXONOMY</span>
            <h1 class="text-2xl font-black text-white tracking-tight">카테고리 관리</h1>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Panel: Categories List (Col: 7) -->
            <div class="lg:col-span-7 bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden shadow-xl">
              <div class="p-5 bg-neutral-950 border-b border-neutral-800">
                <h2 class="text-xs font-bold text-white tracking-wide uppercase">카테고리 아카이브</h2>
              </div>
              <div class="divide-y divide-neutral-800/80">
                ${list.length > 0 ? list.map(cat => {
                  const isEditing = currentEditingCategoryId === cat.id;
                  return `
                    <div class="p-4 flex items-center justify-between gap-4 hover:bg-neutral-950/20 transition-colors">
                      ${isEditing ? `
                        <div class="flex-1 grid grid-cols-3 gap-2">
                          <input type="text" id="ec-name-${cat.id}" value="${cat.name}" class="bg-neutral-950 border border-neutral-800 rounded px-2.5 py-1 text-xs text-white" />
                          <input type="text" id="ec-slug-${cat.id}" value="${cat.slug}" class="bg-neutral-950 border border-neutral-800 rounded px-2.5 py-1 text-xs text-white" />
                          <input type="number" id="ec-order-${cat.id}" value="${cat.sort_order}" class="bg-neutral-950 border border-neutral-800 rounded px-2.5 py-1 text-xs text-white" />
                        </div>
                      ` : `
                        <div class="flex items-center gap-4">
                          <div class="h-8 w-8 bg-neutral-950 border border-neutral-800 flex items-center justify-center rounded text-xs font-bold font-mono text-accent">
                            ${cat.sort_order}
                          </div>
                          <div>
                            <p class="font-extrabold text-neutral-200 text-sm leading-tight">${cat.name}</p>
                            <span class="text-[10px] text-neutral-500 font-mono tracking-wider">slug: ${cat.slug}</span>
                          </div>
                        </div>
                      `}
                      <div class="flex items-center gap-1.5">
                        ${isEditing ? `
                          <button onclick="saveInlineCategory('${cat.id}')" class="p-1.5 bg-emerald-950/20 border border-emerald-900 text-emerald-400 hover:bg-emerald-900 hover:text-white rounded cursor-pointer"><i data-lucide="check" class="h-3.5 w-3.5"></i></button>
                          <button onclick="cancelInlineEditCategory()" class="p-1.5 bg-neutral-850 hover:bg-neutral-800 text-neutral-400 rounded border border-neutral-850 cursor-pointer"><i data-lucide="x" class="h-3.5 w-3.5"></i></button>
                        ` : `
                          <button onclick="editInlineCategory('${cat.id}')" class="p-1.5 bg-neutral-850 hover:bg-neutral-800 text-neutral-400 hover:text-white rounded border border-neutral-850 cursor-pointer"><i data-lucide="edit-2" class="h-3.5 w-3.5"></i></button>
                          <button onclick="deleteCmsCategory('${cat.id}')" class="p-1.5 bg-neutral-850 hover:bg-red-950/30 text-neutral-400 hover:text-red-400 rounded border border-neutral-850 hover:border-red-900 transition-colors cursor-pointer"><i data-lucide="trash-2" class="h-3.5 w-3.5"></i></button>
                        `}
                      </div>
                    </div>
                  `;
                }).join("") : `<div class="py-16 text-center text-xs text-neutral-500">등록된 카테고리가 없습니다.</div>`}
              </div>
            </div>

            <!-- Right Panel: Creation Form (Col: 5) -->
            <div class="lg:col-span-5 bg-neutral-900 border border-neutral-800 p-6 rounded-xl shadow-xl h-fit space-y-6">
              <div>
                <h2 class="text-sm font-bold text-white tracking-wide">신규 카테고리 등록</h2>
                <p class="text-[10px] text-neutral-400 font-light mt-1">포트폴리오 필터 탭에 즉시 연동됩니다.</p>
              </div>
              <form onsubmit="createNewCmsCategory(event)" class="space-y-4">
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">카테고리명 *</label>
                  <input type="text" id="nc-name" required oninput="handleCategoryNameInput(this)" placeholder="예: 영상 편집" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3.5 py-2.5 text-xs text-white focus:outline-none focus:border-accent" />
                </div>
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">영어 주소 슬러그 (Slug) *</label>
                  <input type="text" id="nc-slug" required placeholder="editing" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3.5 py-2.5 text-xs text-white focus:outline-none focus:border-accent" />
                </div>
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">노출 정렬 순서</label>
                  <input type="number" id="nc-order" value="${list.length + 1}" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3.5 py-2.5 text-xs text-white focus:outline-none" />
                </div>
                <button type="submit" class="w-full bg-accent hover:bg-accent-hover text-white font-bold text-xs tracking-widest py-3 rounded-lg flex items-center justify-center gap-1 transition-colors cursor-pointer">
                  <i data-lucide="plus" class="h-4 w-4"></i> 카테고리 추가
                </button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    window.handleCategoryNameInput = function(elem) {
      const slugInput = document.getElementById("nc-slug");
      slugInput.value = elem.value
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9가-힣\s-]/g, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");
    };

    window.createNewCmsCategory = function(e) {
      e.preventDefault();
      const name = document.getElementById("nc-name").value;
      const slug = document.getElementById("nc-slug").value;
      const order = Number(document.getElementById("nc-order").value);

      db.saveCategory({ name, slug, sort_order: order });
      renderAdminCategoriesView();
      if (typeof lucide !== "undefined") lucide.createIcons();
    };

    window.editInlineCategory = function(id) {
      currentEditingCategoryId = id;
      renderAdminCategoriesView();
      if (typeof lucide !== "undefined") lucide.createIcons();
    };

    window.cancelInlineEditCategory = function() {
      currentEditingCategoryId = null;
      renderAdminCategoriesView();
      if (typeof lucide !== "undefined") lucide.createIcons();
    };

    window.saveInlineCategory = function(id) {
      const name = document.getElementById(`ec-name-${id}`).value;
      const slug = document.getElementById(`ec-slug-${id}`).value;
      const order = Number(document.getElementById(`ec-order-${id}`).value);

      db.saveCategory({ id, name, slug, sort_order: order });
      currentEditingCategoryId = null;
      renderAdminCategoriesView();
      if (typeof lucide !== "undefined") lucide.createIcons();
    };

    window.deleteCmsCategory = function(id) {
      if (confirm("이 카테고리를 정말 삭제하시겠습니까?")) {
        db.deleteCategory(id);
        renderAdminCategoriesView();
        if (typeof lucide !== "undefined") lucide.createIcons();
      }
    };

    // Admin Settings View
    function renderAdminSettingsView() {
      const container = document.getElementById("admin-view-content");
      const settings = db.getSettings();

      container.innerHTML = `
        <div class="space-y-8 animate-fade-in">
          <!-- Header -->
          <div class="border-b border-neutral-800 pb-6">
            <span class="text-[10px] font-bold tracking-widest text-accent uppercase">CMS PREFERENCES</span>
            <h1 class="text-2xl font-black text-white tracking-tight">전역 사이트 설정</h1>
          </div>

          <div id="settings-success-alert" class="p-4 bg-emerald-950/20 border border-emerald-800 rounded-xl text-xs text-emerald-400 font-bold flex items-center gap-2 hidden">
            <i data-lucide="check-circle" class="h-4 w-4"></i> 사이트 설정 정보가 성공적으로 반영되었습니다.
          </div>

          <form onsubmit="submitAdminSettingsForm(event)" class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Left panel (Site Info) -->
            <div class="lg:col-span-8 bg-neutral-900 border border-neutral-800 p-6 sm:p-8 rounded-xl shadow-xl space-y-6">
              <div class="space-y-1.5">
                <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">사이트 타이틀</label>
                <input type="text" id="s-title" value="${settings.site_title}" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-accent" />
              </div>
              <div class="space-y-1.5">
                <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">사이트 설명</label>
                <textarea id="s-desc" rows="3" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-accent resize-none leading-relaxed">${settings.site_description}</textarea>
              </div>

              <!-- Hero banner settings -->
              <div class="border-t border-neutral-800 pt-6 space-y-6">
                <h3 class="text-xs font-bold text-white tracking-wide uppercase flex items-center gap-1.5">
                  <i data-lucide="globe" class="h-4 w-4 text-neutral-500"></i> 메인 홈 히어로 텍스트 편집
                </h3>
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">히어로 대형 타이틀</label>
                  <input type="text" id="s-hero-title" value="${settings.hero_title}" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-4 py-3 text-sm text-white focus:outline-none" />
                </div>
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">히어로 서브 설명문구</label>
                  <textarea id="s-hero-sub" rows="3" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-4 py-3 text-sm text-white focus:outline-none resize-none leading-relaxed">${settings.hero_subtitle}</textarea>
                </div>
              </div>
            </div>

            <!-- Right panel (Metadata & Actions) -->
            <div class="lg:col-span-4 space-y-6">
              <div class="bg-neutral-900 border border-neutral-800 p-6 rounded-xl shadow-xl space-y-5">
                <h3 class="text-xs font-bold text-white tracking-wide uppercase border-b border-neutral-800 pb-3 flex items-center gap-1.5">
                  <i data-lucide="mail" class="h-4 w-4 text-neutral-500"></i> 문의처 & SNS 관리
                </h3>
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">대표 문의 이메일</label>
                  <input type="email" id="s-email" value="${settings.contact_email}" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3.5 py-2.5 text-xs text-white focus:outline-none" />
                </div>
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">인스타그램 주소</label>
                  <input type="text" id="s-insta" value="${settings.instagram_url}" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3.5 py-2.5 text-xs text-white focus:outline-none" />
                </div>
                <div class="space-y-1.5">
                  <label class="text-[10px] font-bold tracking-widest text-neutral-400 uppercase">비핸스 주소</label>
                  <input type="text" id="s-behance" value="${settings.behance_url}" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3.5 py-2.5 text-xs text-white focus:outline-none" />
                </div>
              </div>

              <!-- Button -->
              <div class="bg-neutral-900 border border-neutral-800 p-6 rounded-xl shadow-xl space-y-4">
                <button type="submit" id="settings-save-btn" class="w-full bg-accent hover:bg-accent-hover text-white font-bold text-xs tracking-widest py-3.5 rounded-lg flex items-center justify-center gap-1.5 transition-colors cursor-pointer">
                  <i data-lucide="save" class="h-4 w-4"></i> 설정 저장하기
                </button>
                <p class="text-[8px] text-neutral-500 leading-normal text-center">
                  저장을 완료하면 푸터 및 방문자용 정보가 즉시 동기화됩니다.
                </p>
              </div>
            </div>

          </form>
        </div>
      `;
    }

    window.submitAdminSettingsForm = function(e) {
      e.preventDefault();
      const saveBtn = document.getElementById("settings-save-btn");
      saveBtn.disabled = true;
      saveBtn.innerText = "저장 중...";

      const payload = {
        site_title: document.getElementById("s-title").value,
        site_description: document.getElementById("s-desc").value,
        hero_title: document.getElementById("s-hero-title").value,
        hero_subtitle: document.getElementById("s-hero-sub").value,
        contact_email: document.getElementById("s-email").value,
        instagram_url: document.getElementById("s-insta").value,
        behance_url: document.getElementById("s-behance").value
      };

      setTimeout(() => {
        db.saveSettings(payload);
        
        const alert = document.getElementById("settings-success-alert");
        alert.classList.remove("hidden");

        saveBtn.disabled = false;
        saveBtn.innerHTML = `<i data-lucide="save" class="h-4 w-4"></i> 설정 저장하기`;
        
        if (typeof lucide !== "undefined") lucide.createIcons();

        setTimeout(() => {
          alert.classList.add("hidden");
        }, 4000);
      }, 800);
    };

    // ==========================================
    // 7. MAIN INITIALIZATION & LISTENERS
    // ==========================================
    function init() {
      // 1. Local Database seeding
      initDatabase();

      // 2. Initial hash parsing routing
      router();

      // 3. Router hook for hash changes
      window.addEventListener("hashchange", router);
    }

    // Domloaded boot trigger
    window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
